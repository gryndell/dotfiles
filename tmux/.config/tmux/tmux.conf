# Set the prefix
set -g prefix C-space
unbind C-b

# Window Selection
bind -n C-p previous-window
bind -n C-n next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Vim key pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+Arrow keys without prefix to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Split panes with | and -
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
unbind '%'

# Popup border lines
set -g popup-border-lines rounded

# Display popups
bind C-p display-popup \
  -w 82 \
  -h 26 \
  -E

# Display vifm
bind C-f display-popup \
    -w 82 \
    -h 26 \
    -E vifm

# Vi-mode
set-window-option -g mode-keys vi

# Use system clipboard
set -g set-clipboard on

# Copy/Paste Selection keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Pane Borders
set -w -g pane-border-style fg=darkgrey,bg=black
set -w -g pane-active-border-style fg=white,bg=black
set -w -g pane-border-lines single
set -g pane-border-indicators arrows

# Command / message line
set -g message-style fg=black,bg=grey

# Enable mouse control
set -g mouse on

# Default terminal mode to 256color
set -g default-terminal "tmux-256color"
# Override terminal so it displays 32bit RGB color
set -ga terminal-overrides ",*256col*:RGB"

# Set status bar
set -g status-position top
set -g status-justify centre
set -g status-bg black
set -g status-fg white

set -g status-left-length 90
set -g status-left '#[bold,fg=blue][#[fg=green]#H#[default]#[bold,fg=blue]|#[fg=green]#S#[bold,fg=blue]] ['

set -g status-right-length 70
set -g status-right '#[bold,fg=blue]] [ #[default,fg=green]#(date '+%F') #[default,bold,fg=blue]]'

set -w -g window-status-separator " #[fg=red]| "
set-window-option -g window-status-current-format '#[bold,fg=cyan]●#I:#W '
set-window-option -g window-status-format '#[fg=green]#I:#W '
set -w -g window-status-activity-style fg=green,bold
set -w -g window-status-bell-style fg=red,bold

# Disable automatic window naming
bind c command-prompt -p "Window name:" "new-window -n '%%'"

# Enable Activity Alerts
set -w -g monitor-activity on
set -w -g visual-activity on


# Set system bell to chime when anything changes
set-option -g bell-action any

# Update status line every 10 minutes
set -g status-interval 600

# 256 color
set -g default-terminal "screen-256color"

# press R to reload the configuration
bind r source-file ~/.tmux.conf \; \
    display-message "Config reloaded!"

