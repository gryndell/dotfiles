# Override terminal so it displays 32bit RGB color
set -a terminal-overrides ",*256col*:RGB"

# Set the prefix to C-space
set -g prefix C-space
unbind C-b

# Set the delay between prefix and command
set -s escape-time 1

# Split panes with | and -
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
unbind '%'

# Vim key pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+Arrow keys without prefix to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift+Arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Popup border lines
set -g popup-border-lines rounded

# Display popups
bind C-p display-popup \
  -w 82 \
  -h 26 \
  -E

# Display vifm
bind C-f display-popup \
    -w 82 \
    -h 26 \
    -E vifm

# Vi-mode
set-window-option -g mode-keys vi

# Use system clipboard
set -g set-clipboard on

# Copy/Paste Selection keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel


# Enable mouse control
set -g mouse on

# Default terminal mode to 256color
set -g default-terminal "tmux-256color"

# Status bar at the top
set -g status-position top

# Color of the status line
set -g status-style fg=white,bg=black

# Pane Borders
set -w -g pane-border-style fg=darkgrey,bg=black
set -w -g pane-active-border-style fg=white,bg=black
set -w -g pane-border-lines single
set -g pane-border-indicators arrows

# Command / message line
set -g message-style fg=black,bg=grey

# Status line left side
set -g status-left-length 30
set -g status-left "#S │ "

# Status line right side
set -g status-right "%F ⋮ #I.#P "

# Window list
## Color of the window list
set -g window-status-format "#I:#W │"
set -g window-status-style fg=grey,bg=black
## Color of the active window in the window list
set -g window-status-current-style fg=white,bold,bg=black
set -g window-status-current-format "●#I:#W #[fg=grey,nobold]│"
set -g window-status-last-style dim
## Window list at the left
set -g status-justify left
## Window status separator
set -w -g window-status-separator " "
set -w -g window-status-activity-style bg=green
set -w -g window-status-bell-style bg=red

# Enable Activity Alerts
set -w -g monitor-activity on
set -w -g visual-activity on

# Update status line every 10 minutes
set -g status-interval 600


# press R to reload the configuration
bind r source-file ~/.config/tmux/tmux.conf \; \
    display-message "Config reloaded!"


